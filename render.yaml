services:
  - type: web
    name: portfolio-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: CONTACT_RECEIVER_EMAIL
        sync: false
      - key: PORTFOLIO_OWNER_NAME
        sync: false
      - key: PORTFOLIO_OWNER_TITLE
        sync: false
      - key: PORTFOLIO_SITE_URL
        sync: false
      - key: CONTACT_REPLY_WINDOW
        value: within 24-48 hours
