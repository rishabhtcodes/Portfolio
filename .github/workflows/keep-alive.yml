name: Keep Render Backend Alive

on:
  schedule:
    - cron: '*/14 * * * *' # Runs every 14 minutes
  workflow_dispatch: # Allows manual triggering to test

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend Health Endpoint
        run: |
          curl -s -f https://portfolio-backend-dwtz.onrender.com/api/health || echo "Ping failed, but that's okay, it might be waking up"
